  name: Docker Build

  on:
    workflow_call:
      outputs:
        image_tag:
          value: ${{ jobs.build.outputs.image_tag }}

  jobs:

    build:
      runs-on: ubuntu-latest

      outputs:
        image_tag: ${{ steps.meta.outputs.tag }}

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Generate tag
          id: meta
          run: |
            TAG=${GITHUB_SHA::7}
            echo "tag=$TAG" >> $GITHUB_OUTPUT

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Login to DockerHub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
          
        - name: Debug Docker target
          run: |
            echo "Docker username: '${{ secrets.DOCKERHUB_USERNAME }}'"
            echo "Target repo: '${{ secrets.TEST_REPO }}'"
            echo "Final tag: '${{ secrets.TEST_REPO }}:${{ steps.meta.outputs.tag }}'"


        - name: Build image locally
          run: |
            docker build -t ${{ secrets.TEST_REPO }}:${{ steps.meta.outputs.tag }} .

        - name: Scan image
          uses: aquasecurity/trivy-action@0.20.0
          with:
            image-ref: ${{ secrets.TEST_REPO }}:${{ steps.meta.outputs.tag }}
            format: table
            exit-code: 1
            severity: CRITICAL,HIGH

        - name: Push image
          run: |
            docker push ${{ secrets.TEST_REPO }}:${{ steps.meta.outputs.tag }}

