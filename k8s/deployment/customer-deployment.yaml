apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-deployment
  namespace: opslora-test-ns 
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: customers-microservice
  template:
    metadata:
      labels:
        app: customers-microservice
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: customer-app
              topologyKey: kubernetes.io/hostname
      containers:
      - name: customer-container
        image: kubectlandchill/sales-customer-service:v1.2.2
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "150Mi"
            ephemeral-storage: "200Mi"
          limits:
            cpu: "200m"
            memory: "200Mi"
            ephemeral-storage: "500Mi"
        startupProbe:
            httpGet:
              path: /api/v1/customers/health
              port: 3000
              scheme: HTTP
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 24

        readinessProbe:
          httpGet:
            path: /api/v1/customers/health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 2
          successThreshold: 2
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /api/v1/customers/health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 15
          timeoutSeconds: 2
          failureThreshold: 4

      
